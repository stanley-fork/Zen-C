name: Rosetta Code Auto-Scraper

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - name: Checkout Zen-C Repository
        uses: actions/checkout@v4
        with:
          path: 'zen-c'
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout Website Repository
        uses: actions/checkout@v4
        with:
          repository: 'zenc-lang/www'
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: 'website'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Awesome-Zen-C repository
        run: |
          cd zen-c
          git clone https://x-access-token:${{ secrets.WEBSITE_REPO_TOKEN }}@github.com/zenc-lang/awesome-zenc.git examples

      - name: Run Rosetta Code Scraper
        run: |
          cd zen-c
          python .github/scripts/scrape_rosetta.py

      - name: Commit .zc files to Awesome-Zen-C Repo
        run: |
          cd zen-c/examples
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main
          git add examples/rosetta/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync new Rosetta Code examples" && git push origin HEAD:main)


      - name: Sync Markdown to Website Repo
        run: |
          mkdir -p website/docs.zenc-lang.org/content/examples/rosetta/
          rsync -avz --delete --exclude='_index.md' zen-c/website_out/ website/docs.zenc-lang.org/content/examples/rosetta/
          
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs.zenc-lang.org/content/examples/rosetta/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-publish Rosetta Code examples" && git push)
